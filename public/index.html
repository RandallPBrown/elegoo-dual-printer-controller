<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>B&amp;B Ranch &mdash; Forge Control</title>
<style>
  :root{
    --bg:#f4eee3; --bg-2:#efe7d9;
    --panel:#ffffff; --panel-2:#fbf6ee; --panel-3:#f3ebdc;
    --line:#e7dcc8; --line-bright:#dcccb1;
    --ink:#3a2c1f; --ink-dim:#7c6650; --ink-faint:#a4917a;
    --tan:#c9b48f; --copper:#b3692f; --copper-bright:#c9803f; --copper-deep:#8f4f22;
    --ember:#dd6a2c; --bronze:#c98a2e; --sage:#6f9a48;
    --danger:#c0392b; --danger-deep:#9a2c20;
    --steel:#9097a0; --steel-d:#6f757e; --wood:#7a5436;
    --sans:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
    --mono:"Cascadia Code","Cascadia Mono",Consolas,"DejaVu Sans Mono",monospace;
    --shadow:0 16px 40px -26px rgba(70,45,20,.45);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;color:var(--ink);font-family:var(--sans);font-size:14px;
    background:radial-gradient(130% 90% at 50% -15%, #fffdf8 0%, var(--bg) 55%, #ece2d2 100%);}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;
    background-image:repeating-linear-gradient(96deg, rgba(179,105,47,.028) 0 2px, transparent 2px 7px)}

  /* header */
  header{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;padding:11px 20px;
    background:linear-gradient(180deg,#ffffff,#f6efe3);border-bottom:1px solid var(--line-bright);
    box-shadow:0 6px 22px -18px rgba(70,45,20,.5)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .logo{display:grid;place-items:center;width:36px;height:36px;border:1px solid var(--copper);border-radius:8px;
    background:linear-gradient(160deg,#fff,#f3e7d6);box-shadow:inset 0 1px 0 #fff}
  .brand .name{font-weight:700;font-size:18px;letter-spacing:.14em;color:var(--ink);white-space:nowrap}
  .brand .name b{color:var(--copper)}
  .brand .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.32em;color:var(--ink-faint);text-transform:uppercase}
  .spacer{flex:1}
  nav{display:flex;gap:6px}
  .nav-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;background:transparent;color:var(--ink-dim);
    font-family:var(--sans);font-size:13px;letter-spacing:.02em;padding:9px 14px;border-radius:8px;cursor:pointer;transition:.14s}
  .nav-btn svg{width:18px;height:18px;flex:none}
  .nav-btn:hover{color:var(--ink);background:#00000008}
  .nav-btn.on{color:#fff;background:linear-gradient(180deg,var(--copper-bright),var(--copper));font-weight:600;
    box-shadow:0 7px 16px -9px rgba(179,105,47,.8)}
  .nav-btn.on svg [stroke]{stroke:#fff} .nav-btn.on svg [fill]:not([fill="none"]){fill:#fff}

  /* toolbars */
  .toolbar{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--line);
    background:#fbf6eeb3;position:sticky;top:59px;z-index:30;backdrop-filter:blur(5px);flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--ink-dim);
    padding:7px 11px;border:1px solid var(--line-bright);border-radius:6px;background:#fff}
  .pill .count{color:var(--copper);font-weight:700}
  .seg{display:flex;border:1px solid var(--line-bright);border-radius:6px;overflow:hidden;background:#fff}
  .seg button{border:0;background:transparent;color:var(--ink-dim);font-family:var(--mono);font-size:12px;padding:7px 12px;cursor:pointer}
  .seg button+button{border-left:1px solid var(--line)}
  .seg button.on{background:var(--copper);color:#fff;font-weight:700}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-bright);background:#fff;color:var(--ink);
    font-family:var(--sans);font-size:12.5px;padding:9px 14px;border-radius:8px;cursor:pointer;transition:.14s;white-space:nowrap}
  .btn:hover{border-color:var(--copper);color:var(--copper)}
  .btn svg{width:15px;height:15px}
  .btn.primary{background:linear-gradient(180deg,var(--copper-bright),var(--copper));color:#fff;border-color:var(--copper);font-weight:600}
  .btn.primary:hover{filter:brightness(1.07);color:#fff}
  .btn.ghost{background:transparent}

  main{padding:20px;position:relative;z-index:1}
  .view{display:none} .view.on{display:block}

  /* printer grid */
  #grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(450px,1fr))}
  #grid.cols-1{grid-template-columns:1fr}
  #grid.cols-2{grid-template-columns:repeat(2,1fr)}
  .card{background:var(--panel);border:1px solid var(--line-bright);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}

  .frame{position:relative;background:#0b0b0d;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .frame img{width:100%;height:100%;object-fit:contain;display:block}
  .fs-close{position:absolute;top:12px;right:12px;z-index:6;display:none;width:42px;height:42px;border-radius:9px;cursor:pointer;
    align-items:center;justify-content:center;background:#140e08cc;border:1px solid #ffffff44;color:#fff;backdrop-filter:blur(3px);pointer-events:auto}
  .fs-close svg{width:20px;height:20px}
  .frame:fullscreen .fs-close,.frame:-webkit-full-screen .fs-close{display:grid}
  .hud{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}
  .hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 15px;gap:10px}
  .badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    font-weight:700;padding:5px 10px;border-radius:6px;background:#140e08bf;border:1px solid #ffffff2b;color:#e9dcc8;backdrop-filter:blur(3px)}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:#bcae9a}
  .badge.printing{color:#ffb27a} .badge.printing .dot{background:var(--ember);box-shadow:0 0 9px var(--ember)}
  .badge.paused{color:#ffd089} .badge.paused .dot{background:var(--bronze);box-shadow:0 0 9px var(--bronze)}
  .badge.idle{color:#cdbca5} .badge.complete{color:#b6d692} .badge.complete .dot{background:var(--sage)}
  .badge.error,.badge.offline{color:#ff8d7e} .badge.error .dot,.badge.offline .dot{background:var(--danger);box-shadow:0 0 9px var(--danger)}
  .nameplate{margin-top:7px;font-weight:700;font-size:15px;letter-spacing:.12em;color:#e8b486;text-shadow:0 2px 10px #000;text-transform:uppercase}
  .nameplate .mdl{display:block;font-weight:500;font-size:9.5px;letter-spacing:.13em;color:#e9dcc899;margin-top:2px}
  .pct{font-family:var(--mono);font-size:30px;font-weight:800;line-height:.9;color:#fff;text-shadow:0 2px 12px #000}
  .pct small{font-size:14px;color:#cdbca5}
  .hud-bottom{padding:10px 15px 13px;background:linear-gradient(0deg,#120d07e6,transparent)}
  .stats{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-family:var(--mono)}
  .stat{display:flex;align-items:center;gap:6px;font-size:12.5px;color:#e9dcc8}
  .stat svg{width:15px;height:15px} .stat .v{color:#fff;font-weight:600} .stat .t{color:#cdbca5}
  .meta-right{margin-left:auto;display:flex;gap:14px;color:#cdbca5;font-size:12px}
  .meta-right b{color:#fff;font-weight:600}
  .nosignal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:9px;
    background:repeating-linear-gradient(45deg,#15100a,#15100a 12px,#1b140d 12px,#1b140d 24px);color:#cdbca5;text-align:center}
  .nosignal.show{display:flex}
  .nosignal .big{font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#ff8d7e}
  .nosignal .small{font-size:11px;line-height:1.5;max-width:340px;padding:0 20px}

  /* forge progress: hammer striking anvil */
  .forge{position:relative;height:50px;background:linear-gradient(#f0e7d7,#f7f0e4);border-top:1px solid var(--line);overflow:hidden}
  .bar{position:absolute;left:0;right:0;bottom:12px;height:8px;background:#e2d4be;border-top:1px solid #00000014}
  .bar-fill{position:absolute;left:0;top:0;bottom:0;width:0;transition:width .7s ease;
    background:linear-gradient(90deg,#b3692f,var(--ember));box-shadow:0 0 13px -1px var(--ember)}
  .forge.state-paused .bar-fill{background:linear-gradient(90deg,#9a6f1e,var(--bronze));box-shadow:0 0 12px -2px var(--bronze)}
  .forge.state-complete .bar-fill{background:linear-gradient(90deg,#557a32,var(--sage));box-shadow:0 0 12px -2px var(--sage)}
  .forge.state-idle .bar-fill,.forge.state-offline .bar-fill{background:#cdbb9f;box-shadow:none}
  .rig{position:absolute;bottom:1px;width:64px;height:52px;transform:translateX(-50%);transition:left .7s ease;opacity:1}
  .forge.state-idle .rig,.forge.state-offline .rig{opacity:0}
  .rig-svg{width:100%;height:100%;display:block;overflow:visible}
  /* hammer swung by a hand: pivot at the fist, a ~45deg arc down onto the anvil */
  .ham{transform-box:fill-box;transform-origin:53% 22%;transform:rotate(-45deg)}
  .forge.state-printing .ham{animation:strike .82s cubic-bezier(.5,0,.45,1) infinite}
  @keyframes strike{0%,26%{transform:rotate(-45deg)}46%{transform:rotate(6deg)}56%{transform:rotate(-3deg)}70%,100%{transform:rotate(-45deg)}}
  /* sparks burst outward from the impact point at the moment of the strike */
  .sp{opacity:0;transform-box:fill-box;transform-origin:center}
  .sp1{fill:#ffd27a;--dx:-7px;--dy:-9px} .sp2{fill:#ffb24a;--dx:5px;--dy:-12px} .sp3{fill:#ff9a3a;--dx:-2px;--dy:-13px}
  .sp4{fill:#ffce6b;--dx:9px;--dy:-6px} .sp5{fill:#ff8a3a;--dx:-10px;--dy:-5px}
  .forge.state-printing .sp{animation:sparkfly .82s ease-out infinite}
  .forge.state-printing .sp2{animation-delay:.02s} .forge.state-printing .sp3{animation-delay:.04s}
  .forge.state-printing .sp4{animation-delay:.015s} .forge.state-printing .sp5{animation-delay:.03s}
  @keyframes sparkfly{0%,42%{opacity:0;transform:translate(0,0) scale(.5)}48%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx,0),var(--dy,-10px)) scale(.3)}}
  /* the live percentage rides up with the sparks on each strike */
  .pctspark{fill:var(--ember);font:800 11px var(--mono);text-anchor:middle;opacity:0;transform-box:fill-box;transform-origin:center;paint-order:stroke;stroke:#fff7ec;stroke-width:2.4px}
  .forge.state-printing .pctspark{animation:pctfly .82s ease-out infinite}
  @keyframes pctfly{0%,44%{opacity:0;transform:translateY(0)}54%{opacity:1}100%{opacity:0;transform:translateY(-15px)}}

  .actions{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#faf5ec;border-top:1px solid var(--line)}
  .fname{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .icon-btn{width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--line-bright);background:#fff;color:var(--ink-dim);border-radius:8px;cursor:pointer;transition:.14s}
  .icon-btn:hover{border-color:var(--copper);color:var(--copper)} .icon-btn svg{width:17px;height:17px}
  .btn-abort{border:1px solid var(--danger-deep);background:linear-gradient(180deg,#d2503b,#b22f20);color:#fff;font-weight:800;letter-spacing:.1em;
    padding:11px 20px;border-radius:8px;cursor:pointer;font-family:var(--sans);text-transform:uppercase;box-shadow:0 7px 16px -10px rgba(192,57,43,.9);transition:.12s}
  .btn-abort:hover{filter:brightness(1.08)} .btn-abort:active{transform:translateY(1px)}
  .btn-abort:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.5)}

  /* ===== AI spaghetti watchdog ===== */
  .spag{display:none;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:8px 11px;border-radius:8px;border:1px solid var(--line-bright);background:#fff;color:var(--ink-dim);white-space:nowrap;cursor:pointer;transition:.14s}
  .spag:hover{border-color:var(--tan)}
  .spag .d{width:7px;height:7px;border-radius:50%;background:#cdbb9f;flex:none}
  .spag.off{border-style:dashed;color:var(--ink-faint)} .spag.off .d{background:#cdbb9f}
  .spag.dim{color:var(--ink-faint)} .spag.dim .d{background:#cdbb9f}
  .spag.ok{color:#5d7d36;border-color:#cdd9b8} .spag.ok .d{background:var(--sage);box-shadow:0 0 7px var(--sage)}
  .spag.warn{color:#9a6a16;border-color:#e6c98a;background:#fff7e8} .spag.warn .d{background:var(--bronze);box-shadow:0 0 8px var(--bronze)}
  .spag.bad{color:#fff;background:linear-gradient(180deg,#d2503b,#b22f20);border-color:var(--danger-deep)} .spag.bad .d{background:#fff;box-shadow:0 0 7px #fff}
  .spag.err{color:var(--danger);border-color:#e7b3ab;background:#fdeceb} .spag.err .d{background:var(--danger)}

  /* red alarm border on the affected video feed */
  .frame.alarm::after{content:"";position:absolute;inset:0;z-index:5;pointer-events:none;border:3px solid var(--danger);
    box-shadow:inset 0 0 26px -2px rgba(192,57,43,.9),0 0 22px -3px rgba(192,57,43,.7);animation:alarmPulse 1.1s ease-in-out infinite}
  @keyframes alarmPulse{0%,100%{opacity:.5}50%{opacity:1}}
  .alarm-tag{display:none}
  .frame.alarm .alarm-tag{display:block;position:absolute;top:13px;left:50%;transform:translateX(-50%);z-index:7;
    background:linear-gradient(180deg,#d2503b,#b22f20);color:#fff;font-family:var(--mono);font-size:11px;font-weight:800;letter-spacing:.12em;
    text-transform:uppercase;padding:6px 13px;border-radius:7px;box-shadow:0 8px 20px -8px rgba(192,57,43,.95);white-space:nowrap}

  /* dynamic temp chips */
  .temps{display:contents}
  .stat .lab{color:#e8c69a;font-size:10px;letter-spacing:.06em;margin-right:1px}

  /* AI modal bits (reuse .modal/.section/.seg/.toggle/.btn) */
  .ai-status{display:flex;align-items:center;gap:9px;padding:11px 13px;border:1px solid var(--line-bright);border-radius:9px;background:var(--panel-2);
    font-family:var(--mono);font-size:12px;color:var(--ink-dim);margin-bottom:18px;flex-wrap:wrap}
  .ai-status .d{width:9px;height:9px;border-radius:50%;background:#cdbb9f;flex:none}
  .ai-status.ok .d{background:var(--sage)} .ai-status.warn .d{background:var(--bronze)} .ai-status.bad .d{background:var(--danger)} .ai-status.dim .d{background:#cdbb9f}
  .ai-status b{color:var(--ink)}
  .modedesc{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);margin-top:8px;line-height:1.5}
  .timein{background:#fff;border:1px solid var(--line-bright);color:var(--ink);font-family:var(--mono);font-size:13px;padding:8px 10px;border-radius:7px}
  .nrow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .nrow label{font-size:12.5px;color:var(--ink-dim);flex:1}
  .nrow .hint{color:var(--ink-faint);font-size:10.5px;font-family:var(--mono)}
  .nrow input[type=number]{width:84px;background:#fff;border:1px solid var(--line-bright);color:var(--ink);font-family:var(--mono);font-size:13px;padding:8px;border-radius:7px}
  .zlist{display:flex;flex-direction:column;gap:7px}
  .zitem{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
  .zitem .x{margin-left:auto;border:1px solid var(--line-bright);background:#fff;color:var(--danger);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:14px;line-height:1}
  .zitem .x:hover{border-color:var(--danger);background:#fdeceb}

  /* Calibrate overlay */
  .calibwrap{position:relative;width:100%;background:#0b0b0d;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:200px}
  .calibwrap img{display:block;width:100%;height:auto}
  .calibwrap svg{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;touch-action:none}
  .calib-empty{color:#cdbca5;font-family:var(--mono);font-size:12.5px;padding:34px;text-align:center}
  .calib-det{fill:rgba(192,57,43,.14);stroke:var(--danger);stroke-width:3;vector-effect:non-scaling-stroke}
  .calib-zone{fill:rgba(111,154,72,.16);stroke:var(--sage);stroke-width:3;stroke-dasharray:9 6;vector-effect:non-scaling-stroke}
  .calib-draw{fill:rgba(179,105,47,.18);stroke:var(--copper);stroke-width:3;stroke-dasharray:6 5;vector-effect:non-scaling-stroke}
  .calib-zx{fill:#fff;stroke:var(--danger);stroke-width:2;cursor:pointer;vector-effect:non-scaling-stroke}
  .calib-lbl{fill:#fff;font-family:var(--mono);font-size:14px;font-weight:700;paint-order:stroke;stroke:#000;stroke-width:3px}
  .zoneprev svg{cursor:default} .zoneprev .calib-zone{cursor:help}

  footer{padding:10px 20px 26px;color:var(--ink-faint);font-family:var(--mono);font-size:11px;text-align:center}
  footer b{color:var(--copper)}

  /* 3D files */
  #crumbs{display:flex;align-items:center;gap:3px;flex-wrap:wrap;font-family:var(--mono);font-size:12.5px}
  .crumb{border:0;background:transparent;color:var(--copper);font-family:var(--mono);font-size:12.5px;cursor:pointer;padding:4px 5px;border-radius:5px}
  .crumb:hover{background:#00000008} .crumb:last-of-type{color:var(--ink)}
  .crumb-sep{color:var(--ink-faint)}
  .search{flex:1;min-width:120px;max-width:260px;background:#fff;border:1px solid var(--line-bright);color:var(--ink);font-family:var(--mono);font-size:12.5px;padding:8px 11px;border-radius:8px}
  #files-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .tile{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;cursor:pointer;transition:.14s;display:flex;flex-direction:column}
  .tile:hover{border-color:var(--copper);transform:translateY(-2px);box-shadow:0 12px 26px -18px rgba(70,45,20,.45)}
  .tile .thumb{aspect-ratio:1/1;background:#f3ebdc;display:grid;place-items:center;overflow:hidden}
  .tile .thumb img{width:100%;height:100%;object-fit:cover}
  .tile .thumb svg{width:46px;height:46px}
  .tile.dir .thumb{background:linear-gradient(160deg,#f6ecda,#efe2cd)}
  .tile-name{padding:9px 10px 2px;font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile-meta{padding:0 10px 10px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)}
  .tile .more{position:absolute;top:7px;right:7px;width:28px;height:28px;border-radius:7px;border:1px solid var(--line-bright);background:#ffffffe6;
    color:var(--ink-dim);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:16px;line-height:1}
  .tile:hover .more,.tile .more.show{display:flex} .tile .more:hover{color:var(--copper);border-color:var(--copper)}
  .empty{grid-column:1/-1;padding:40px;text-align:center;color:var(--ink-faint);font-family:var(--mono);font-size:12.5px}
  .empty.err{color:var(--danger)}

  /* overlays */
  .overlay{position:fixed;inset:0;z-index:60;background:#2a1c128c;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:22px}
  .overlay.show{display:flex}
  .modal{width:min(720px,100%);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line-bright);border-radius:13px;box-shadow:0 40px 90px -30px rgba(50,30,10,.5)}
  .modal-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .modal-head .t{font-weight:700;font-size:15px;letter-spacing:.05em}
  .modal-head .sub{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.07em}
  .tabs{display:flex;gap:5px;margin-left:auto}
  .tabs button{border:1px solid var(--line);background:#fff;color:var(--ink-dim);font-family:var(--sans);font-size:12.5px;padding:8px 13px;border-radius:8px;cursor:pointer}
  .tabs button.on{background:var(--copper);color:#fff;font-weight:700;border-color:var(--copper)}
  .close{margin-left:4px;width:34px;height:34px;border:1px solid var(--line);background:#fff;color:var(--ink-dim);border-radius:8px;cursor:pointer;font-size:17px}
  .modal-body{padding:18px;overflow:auto}
  .section{margin-bottom:20px} .section:last-child{margin-bottom:0}
  .section h4{margin:0 0 10px;font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-dim)}
  .section.disabled{opacity:.45}
  .section .lock{font-size:10px;color:var(--copper);margin-left:8px;text-transform:none;letter-spacing:0}

  function tempChips(s){

  /* ===== AI watchdog: pill + alarm border + notifications (per printer) ===== */
  var aiState=null, aiPrinter=null, spagPrev={}, titleBlink=null, origTitle=document.title;
  function spagBase(){return '/api/'+(aiPrinter==null?0:aiPrinter)+'/spaghetti';}
  function aiVisible(){var o=document.getElementById('ai-overlay');return !!(o&&o.classList.contains('show'));}
  function statusClass(s){return (s==='watching')?'ok':(s==='warning'||s==='tripped'||s==='grace')?'warn':(s==='alert'||s==='acted'||s==='error')?'bad':'dim';}
  function browserNotifyOn(){return ('Notification' in window)&&localStorage.getItem('spagBrowserNotify')==='1'&&Notification.permission==='granted';}
  function soundOn(){return localStorage.getItem('spagSound')==='1';}
  function beep(times){try{var Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;var ctx=new Ctx(),t=ctx.currentTime;for(var i=0;i<times;i++){var o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=880;o.connect(g);g.connect(ctx.destination);var st=t+i*0.3;g.gain.setValueAtTime(0.0001,st);g.gain.exponentialRampToValueAtTime(0.2,st+0.02);g.gain.exponentialRampToValueAtTime(0.0001,st+0.24);o.start(st);o.stop(st+0.26);}setTimeout(function(){try{ctx.close();}catch(e){}},times*320+500);}catch(e){}}
  function startTitleBlink(msg){stopTitleBlink();var on=false;titleBlink=setInterval(function(){document.title=on?origTitle:msg;on=!on;},900);}
  function stopTitleBlink(){if(titleBlink){clearInterval(titleBlink);titleBlink=null;document.title=origTitle;}}
  function fireBrowserAlert(st){
    var acted=(st.status==='acted'),who=st.printerName||('Printer '+st.printerIndex);
    var title=acted?('Print cancelled \u2014 '+who):('\u26a0 Possible print failure \u2014 '+who);
    var body=acted?'Spaghetti detected; the print was auto-cancelled.':'Spaghetti detected. Open the console and stop the print.';
    if(browserNotifyOn()){try{var n=new Notification(title,{body:body,tag:'spag-'+st.printerIndex});n.onclick=function(){window.focus();try{n.close();}catch(e){}};}catch(e){}}
    if(soundOn())beep(acted?2:3);
    startTitleBlink(acted?('\u2717 '+who+' cancelled'):('\u26a0 '+who+' \u2014 check print'));
  }
  function renderSpag(st){
    if(!st||st.printerIndex==null)return;
    if(aiVisible()&&aiPrinter===st.printerIndex){aiState=st;updateAiStatus(st);}
    var c=cards[st.printerIndex];
    if(c){
      if(c.spag){
        var s=st.status,cls='spag',lbl='AI';
        if(st.mode==='off'||s==='disabled'){cls+=' off';lbl='AI off';}
        else if(s==='acted'){cls+=' bad';lbl='AI \u2715 CANCELLED';}
        else if(s==='alert'){cls+=' bad';lbl='AI \u26a0 STOP IT';}
        else if(s==='tripped'){cls+=' bad';lbl='AI \u26a0 '+st.streak+'/'+st.need;}
        else if(s==='warning'){cls+=' warn';lbl='AI \u26a0 '+st.streak+'/'+st.need;}
        else if(s==='watching'){cls+=' ok';lbl='AI \u2713 '+(st.effectiveMode==='act'?'armed':'notify');}
        else if(s==='grace'){cls+=' dim';lbl='AI \u00b7 warming up';}
        else if(s==='error'){cls+=' err';lbl='AI \u00b7 error';}
        else {cls+=' dim';lbl='AI \u00b7 idle';}
        c.spag.className=cls;c.spagT.textContent=lbl;
        var tip=(st.message||'')+'  \u00b7 mode: '+st.mode;if(typeof st.lastScore==='number'&&s!=='disabled')tip+='  \u00b7 score '+st.lastScore;tip+='   (tap for AI settings)';
        c.spag.title=tip;c.spag.style.display='inline-flex';
      }
      var alarm=(st.status==='alert'||st.status==='acted');
      if(c.frame)c.frame.classList.toggle('alarm',alarm);
      if(c.alarmTag)c.alarmTag.textContent=(st.status==='acted')?'\u2717 Print cancelled':'\u26a0 Failure \u2014 stop print';
    }
    var prev=spagPrev[st.printerIndex];
    var nowAlarm=(st.status==='alert'||st.status==='acted'),wasAlarm=(prev==='alert'||prev==='acted');
    if(nowAlarm&&!wasAlarm)fireBrowserAlert(st);
    if(!nowAlarm&&wasAlarm&&!anyAlarm())stopTitleBlink();
    spagPrev[st.printerIndex]=st.status;
  }
  function anyAlarm(){return Object.keys(spagPrev).some(function(k){return spagPrev[k]==='alert'||spagPrev[k]==='acted';});}
  function pollSpag(){getJSON('/api/spaghetti').then(function(d){(d&&d.watchers||[]).forEach(renderSpag);}).catch(function(){});}

  /* ===== Calibrate (snapshot + detection/zone overlay, drag to add) ===== */

  function renderCalibShell(snapUrl,warn,loading){

    document.getElementById('calib').innerHTML=''+
      '<div class="modal-head"><div><div class="t">Calibrate dead zones</div><div class="sub">'+who+' camera</div></div><button class="btn" id="cb-rescan">Re-scan</button><button class="close" id="cb-close">\u00d7</button></div>'+
      '<div class="modal-body">'+
        '<div class="modedesc" style="margin-bottom:11px">Drag on the image to box-out anything that falsely trips the model (rails, drag chain, reflections). <span style="color:var(--danger)">Red</span> = live detections, <span style="color:var(--sage)">green dashed</span> = your dead zones; tap a white \u00d7 to remove one.'+(warn?(' <span style="color:var(--danger)">'+warn+'</span>'):'')+'</div>'+
        '<div class="calibwrap" id="cb-wrap">'+(loading?'<div class="calib-empty">Loading snapshot\u2026</div>':(hasImg?('<img id="cb-img" src="'+snapUrl+(snapUrl.indexOf('?')>=0?'&':'?')+'t='+Date.now()+'"><svg id="cb-svg" preserveAspectRatio="none"></svg>'):('<div class="calib-empty">'+(warn||'No snapshot URL configured in CONFIG')+'</div>')))+'</div>'+
        '<div class="row" style="margin-top:13px"><button class="btn primary" id="cb-save">Save dead zones</button><button class="btn" id="cb-clear">Clear all</button><div class="muted" id="cb-count" style="flex:1;text-align:right"></div></div>'+
      '</div>';

  function bindCalibDraw(svg){
    svg.onpointerdown=function(e){if(e.target&&e.target.getAttribute&&e.target.getAttribute('class')==='calib-zx')return;e.preventDefault();try{svg.setPointerCapture(e.pointerId);}catch(x){}var p=svgPt(svg,e);calibDrag={x0:p.x,y0:p.y,x1:p.x,y1:p.y};drawCalib();};
    svg.onpointermove=function(e){if(!calibDrag)return;var p=svgPt(svg,e);calibDrag.x1=p.x;calibDrag.y1=p.y;drawCalib();};
    svg.onpointerup=function(e){if(!calibDrag)return;var d=calibDrag;calibDrag=null;var x=Math.min(d.x0,d.x1),y=Math.min(d.y0,d.y1),w=Math.abs(d.x1-d.x0),h=Math.abs(d.y1-d.y0);if(w>=10&&h>=10)calibZones.push([Math.round(x+w/2),Math.round(y+h/2),Math.round(w),Math.round(h)]);drawCalib();};
  }
  function crect(cls,x,y,w,h){return '<rect class="'+cls+'" x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'"/>';}
  function drawCalib(){
    var svg=document.getElementById('cb-svg');if(!svg)return;var s='';
    calibDets.forEach(function(d){var b=d&&d[2];if(!Array.isArray(b))return;var x=b[0]-b[2]/2,y=b[1]-b[3]/2;s+=crect('calib-det',x,y,b[2],b[3]);var cf=(typeof d[1]==='number')?(' '+Math.round(d[1]*100)+'%'):'';s+='<text class="calib-lbl" x="'+(x+5)+'" y="'+(y+19)+'">'+(d[0]||'fail')+cf+'</text>';});
    calibZones.forEach(function(z,i){var x=z[0]-z[2]/2,y=z[1]-z[3]/2;s+=crect('calib-zone',x,y,z[2],z[3]);s+='<circle class="calib-zx" data-zi="'+i+'" cx="'+(x+z[2])+'" cy="'+y+'" r="13"/><text class="calib-lbl" x="'+(x+z[2])+'" y="'+(y+5)+'" text-anchor="middle" style="pointer-events:none">\u00d7</text>';});
    if(calibDrag){var x=Math.min(calibDrag.x0,calibDrag.x1),y=Math.min(calibDrag.y0,calibDrag.y1),w=Math.abs(calibDrag.x1-calibDrag.x0),h=Math.abs(calibDrag.y1-calibDrag.y0);s+=crect('calib-draw',x,y,w,h);}
    svg.innerHTML=s;
    var cnt=document.getElementById('cb-count');if(cnt)cnt.textContent=calibZones.length+' zone'+(calibZones.length===1?'':'s')+' \u00b7 '+calibDets.length+' detection'+(calibDets.length===1?'':'s')+' now';
    [].forEach.call(svg.querySelectorAll('.calib-zx'),function(c){c.onpointerdown=function(e){e.stopPropagation();e.preventDefault();calibZones.splice(+c.getAttribute('data-zi'),1);drawCalib();};});
  }

      var tbl=el('table');var hr=el('tr');cols.forEach(function(c){hr.appendChild(el('th',null,c));});tbl.appendChild(hr);
      rows.forEach(function(r){var tr=el('tr');if(kind==='files'){tr.appendChild(el('td','name',r.name));tr.appendChild(el('td',null,r.sizeMB||'\u2014'));tr.appendChild(el('td',null,r.modified?r.modified.replace('T',' ').slice(0,16):'\u2014'));}else{tr.appendChild(el('td','name',r.name));tr.appendChild(el('td',null,r.status||'\u2014'));tr.appendChild(el('td',null,r.started?r.started.replace('T',' ').slice(0,16):'\u2014'));tr.appendChild(el('td',null,fmtTime(r.durationSec)));}tbl.appendChild(tr);});
      body.innerHTML='';body.appendChild(tbl);}).catch(function(){body.innerHTML='<div class="empty err">Could not load '+kind+'.</div>';});}

  /* ---- 3D files ---- */
  var filesData=null,filesCwd='',filesInit=false;
  function loadFiles(rel){filesCwd=rel;var g=document.getElementById('files-grid');g.innerHTML='<div class="empty">Loading...</div>';
    getJSON('/api/files/browse?path='+encodeURIComponent(rel)).then(renderFiles).catch(function(){g.innerHTML='<div class="empty err">Could not reach the library.</div>';});}
  function renderFiles(data){filesData=data;var bc=document.getElementById('crumbs');bc.innerHTML='';
    (data.crumbs||[]).forEach(function(c,i){var a=el('button','crumb',c.name);a.onclick=function(){loadFiles(c.rel);};bc.appendChild(a);if(i<data.crumbs.length-1)bc.appendChild(el('span','crumb-sep',SEP));});
    drawTiles();}
  function drawTiles(){var g=document.getElementById('files-grid');g.innerHTML='';if(!filesData)return;
    if(filesData.error){g.appendChild(el('div','empty err',filesData.error+(/not found/.test(filesData.error)?' \u2014 check the share path in CONFIG.FILE_BROWSER.root':'')));return;}
    var q=(document.getElementById('files-search').value||'').toLowerCase();
    var rows=(filesData.entries||[]).filter(function(e){return !q||e.name.toLowerCase().indexOf(q)>=0;});
    if(!rows.length){g.appendChild(el('div','empty',q?'No matches.':'This folder is empty.'));return;}
    rows.forEach(function(e){g.appendChild(tile(e));});}
  function tile(e){var t=el('div','tile '+(e.type==='dir'?'dir':'file'));
    var th=el('div','thumb');
    if(e.type==='dir')th.innerHTML=ICON.folder;
    else if(e.thumb){var img=el('img');img.loading='lazy';img.src=API+'/api/files/thumb?path='+encodeURIComponent(e.rel);img.onerror=function(){th.innerHTML=iconFor(e.kind);};th.appendChild(img);}
    else th.innerHTML=iconFor(e.kind);
    var nm=el('div','tile-name',e.name);nm.title=e.name;
    var mt=el('div','tile-meta',e.type==='dir'?'Folder':fmtSize(e.sizeMB));
    t.appendChild(th);t.appendChild(nm);t.appendChild(mt);
    if(filesWritable){var more=el('button','more','\u22ee');more.title='Manage';more.onclick=function(ev){ev.stopPropagation();openSheet(e);};t.appendChild(more);}
    t.onclick=function(){if(e.type==='dir')loadFiles(e.rel);else openPreview(e);};
    return t;}
  function openPreview(e){var pv=document.getElementById('preview');pv.innerHTML='';
    var iw=el('div','pv-img');
    if(e.thumb){var img=el('img');img.src=API+'/api/files/thumb?path='+encodeURIComponent(e.rel);img.onerror=function(){iw.innerHTML=iconFor(e.kind);};iw.appendChild(img);}else iw.innerHTML=iconFor(e.kind);
    var foot=el('div','pv-foot');
    var info=elH('div',null,'<div class="pv-name">'+e.name+'</div><div class="pv-sub">'+e.kind.toUpperCase()+(e.sizeMB!=null?' '+DOT+' '+fmtSize(e.sizeMB):'')+'</div>');info.style.flex='1';info.style.minWidth='120px';
    var dl=document.createElement('a');dl.className='linkbtn';dl.textContent='Download';dl.href=API+'/api/files/download?path='+encodeURIComponent(e.rel);dl.setAttribute('download','');
    var close=el('button','btn ghost','Close');close.onclick=function(){hide('preview-overlay');};
    foot.appendChild(info);if(filesWritable){var man=el('button','btn','Manage');man.onclick=function(){hide('preview-overlay');openSheet(e);};foot.appendChild(man);}foot.appendChild(dl);foot.appendChild(close);
    pv.appendChild(iw);pv.appendChild(foot);show('preview-overlay');}
  function openSheet(e){var sh=document.getElementById('sheet');sh.innerHTML='';
    var head=elH('div','sheet-head',(e.type==='dir'?ICON.folder:iconFor(e.kind))+'<span class="nm">'+e.name+'</span>');
    var bodyEl=el('div','sheet-body');
    function item(label,icon,fn,danger){var b=elH('button',danger?'danger':null,icon+'<span>'+label+'</span>');b.onclick=function(){hide('sheet-overlay');fn();};bodyEl.appendChild(b);}
    if(e.type==='dir')item('Open',ICON.open,function(){loadFiles(e.rel);});
    else{item('Preview',ICON.open,function(){openPreview(e);});item('Download',ICON.dl,function(){var a=document.createElement('a');a.href=API+'/api/files/download?path='+encodeURIComponent(e.rel);a.setAttribute('download','');document.body.appendChild(a);a.click();a.remove();});}
    item('Rename',ICON.rename,function(){doRename(e);});
    item('Move to'+'\u2026',ICON.move,function(){doMove(e);});
    item('Delete',ICON.trash,function(){doDelete(e);},true);
    sh.appendChild(head);sh.appendChild(bodyEl);show('sheet-overlay');}
  function doRename(e){promptText({title:'Rename',value:e.name,placeholder:'New name',okText:'Rename'}).then(function(name){if(!name||name===e.name)return;
    post('/api/files/rename',{from:e.rel,name:name}).then(function(r){if(r.ok){toast('Renamed','ok');loadFiles(filesCwd);}else toast(r.error||'Rename failed','err');});});}
  function doMove(e){pickFolder('Move \u201c'+e.name+'\u201d to\u2026',e.type==='dir'?e.rel:null).then(function(dest){if(dest===null)return;
    post('/api/files/move',{from:e.rel,toDir:dest}).then(function(r){if(r.ok){toast('Moved to '+(dest||'3D Files'),'ok');loadFiles(filesCwd);}else toast(r.error||'Move failed','err');});});}
  function doDelete(e){confirmBox({title:'Delete',danger:true,okText:'Delete',msg:'Move \u201c'+e.name+'\u201d to the trash? It goes to a hidden .trash folder on the server and can be recovered there.'}).then(function(ok){if(!ok)return;
    post('/api/files/delete',{path:e.rel}).then(function(r){if(r.ok){toast('Moved to trash','ok');loadFiles(filesCwd);}else toast(r.error||'Delete failed','err');});});}

  /* ---- filament ---- */
  function openFilament(){var m=document.getElementById('filament');
    var cats=[['PLA','pla'],['PETG','petg'],['ABS','abs'],['ASA','asa'],['TPU','tpu'],['Nylon','nylon'],['Carbon Fiber','carbon-fiber'],['Polycarbonate','pc-polycarbonate']];
    m.innerHTML=''+
      '<div class="modal-head"><div><div class="t">Filament</div><div class="sub">3DXTech '+DOT+' opens in a new tab</div></div><button class="close" id="fil-close">'+X+'</button></div>'+
      '<div class="modal-body">'+
        '<div class="fil-hero"><div style="flex:1;min-width:160px"><div class="mk">3DXTECH</div><div class="ds">U.S.-made performance filament &mdash; your go-to spool supplier.</div></div>'+
          '<a class="linkbtn" target="_blank" rel="noopener" href="https://www.3dxtech.com/collections/all">Shop all filament '+ARROW+'</a></div>'+
        '<div class="section"><h4>Jump to a material</h4><div class="chips">'+cats.map(function(c){return '<a class="matchip" target="_blank" rel="noopener" href="https://www.3dxtech.com/collections/'+c[1]+'">'+c[0]+'</a>';}).join('')+'</div></div>'+
        '<div class="section"><h4>Handy links</h4><div class="chips">'+
          '<a class="matchip" target="_blank" rel="noopener" href="https://www.3dxtech.com/collections/all?sort_by=manual&filter.v.m.mm-google-shopping.gender=ON+SALE">On sale</a>'+
          '<a class="matchip" target="_blank" rel="noopener" href="https://www.flipsnack.com/88E6B866AED/filament-catalog-2025/full-view.html">2026 catalog</a>'+
          '<a class="matchip" target="_blank" rel="noopener" href="https://www.3dxtech.com/pages/rewards-program">Rewards</a>'+
          '<a class="matchip" target="_blank" rel="noopener" href="https://www.3dxtech.com/pages/filament-drying-instructions">Drying guide</a></div></div>'+
        '<div class="muted">3DXTech is a Shopify store and blocks embedding, so these open in a new tab &mdash; your cart and login stay on their site.</div>'+
      '</div>';
    document.getElementById('fil-close').onclick=function(){hide('filament-overlay');};show('filament-overlay');}

  /* ---- master logs modal ---- */
  var logsTimer=null, logSource='all';
  function escapeHtml(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function openLogs(){show('logs-overlay');renderLogsShell();loadLogs();clearInterval(logsTimer);logsTimer=setInterval(loadLogs,2500);}
  function closeLogs(){hide('logs-overlay');clearInterval(logsTimer);logsTimer=null;}
  function renderLogsShell(){
    var sources=[['all','All'],['obico','AI'],['control','Control'],['ntfy','ntfy'],['printer','Printers'],['system','System']];
    var seg=sources.map(function(s){return '<button data-src="'+s[0]+'" class="'+(logSource===s[0]?'on':'')+'">'+s[1]+'</button>';}).join('');
    document.getElementById('logs').innerHTML=''+
      '<div class="modal-head"><div><div class="t">Logs</div><div class="sub">Obico · Forge Control · printers · notifications</div></div><button class="close" id="logs-close">×</button></div>'+
      '<div class="modal-body">'+
        '<div class="seg logs-seg" id="logs-seg">'+seg+'</div>'+
        '<div class="logtable" id="logs-list"><div class="empty">Loading…</div></div>'+
        '<div class="row" style="margin-top:11px"><div class="muted" style="flex:1">Live · newest at the bottom · updates every 2.5s</div><button class="btn ghost" id="logs-done">Done</button></div>'+
      '</div>';
    document.getElementById('logs-close').onclick=closeLogs;
    document.getElementById('logs-done').onclick=closeLogs;
    document.getElementById('logs-seg').onclick=function(e){var b=e.target.closest('button[data-src]');if(!b)return;logSource=b.dataset.src;renderLogsShell();loadLogs();};
  }
  function loadLogs(){if(!document.getElementById('logs-list'))return;getJSON('/api/logs?limit=400'+(logSource!=='all'?'&source='+encodeURIComponent(logSource):'')).then(renderLogs).catch(function(){});}
  function renderLogs(d){
    var box=document.getElementById('logs-list');if(!box)return;
    var rows=(d&&d.entries)||[];
    if(!rows.length){box.innerHTML='<div class="empty">No log entries'+(logSource!=='all'?' for this source':'')+' yet.</div>';return;}
    var atBottom=(box.scrollTop+box.clientHeight>=box.scrollHeight-30);
    box.innerHTML=rows.map(function(e){
      var ts=new Date(e.t).toLocaleTimeString();
      return '<div class="logrow lv-'+e.level+'"><span class="lt">'+ts+'</span><span class="lsrc src-'+e.source+'">'+escapeHtml(e.source)+'</span><span class="lmsg">'+escapeHtml(e.message)+'</span></div>';
    }).join('');
    if(atBottom)box.scrollTop=box.scrollHeight;
  }

  /* ---- settings page (full in-app config) ---- */
  var cfgData=null;
  function openSettings(){show('settings-overlay');document.getElementById('settings').innerHTML='<div class="modal-head"><div class="t">Settings</div><button class="close" id="set-close">×</button></div><div class="modal-body"><div class="empty">Loading…</div></div>';var cl=document.getElementById('set-close');if(cl)cl.onclick=closeSettings;getJSON('/api/config').then(function(c){cfgData=c;renderSettings();}).catch(function(){document.getElementById('settings').innerHTML='<div class="modal-body"><div class="empty err">Could not load settings.</div></div>';});}
  function closeSettings(){hide('settings-overlay');}
  function ti(id,val,type,ph){return '<input id="'+id+'" type="'+(type||'text')+'"'+(ph?(' placeholder="'+ph+'"'):'')+' value="'+escAttr(val)+'">';}
  function escAttr(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
  function yn(id,on){return '<select id="'+id+'"><option value="yes"'+(on?' selected':'')+'>Yes</option><option value="no"'+(on?'':' selected')+'>No</option></select>';}
  function renderSettings(){
    var c=cfgData||{};var cn=c.console||{},ai=c.ai||{},fl=c.files||{},prs=c.printers||[];
    var snapEx=(c.consoleBase||c.lanBase||'http://&lt;this-console&gt;')+'/api/0/snapshot';
    var h=''+
      '<div class="modal-head"><div><div class="t">Settings</div><div class="sub">Everything is editable here — no need to touch server.js</div></div><button class="close" id="set-close">×</button></div>'+
      '<div class="modal-body">'+
        '<div class="section"><h4>Console</h4>'+
          '<div class="cfg-row"><label>Public URL</label>'+ti('set-pub',cn.publicUrl,'text','https://forge.example.com (optional)')+'</div>'+
          '<div class="cfg-hint">Only needed to <b>Abort from your phone when you’re away from home</b>. On your own wifi the auto address <code>'+escAttr(c.lanBase||'(detecting…)')+'</code> already works. ⚠ A public URL exposes an unauthenticated abort endpoint — put it behind a VPN/auth if that matters.</div>'+
          '<div class="cfg-row"><label>Port</label>'+ti('set-port',cn.port,'number')+'<label style="width:auto">Host</label>'+ti('set-host',cn.host)+'</div>'+
          '<div class="cfg-hint">Changing port/host needs a server restart to take effect.</div>'+
        '</div>'+
        '<div class="section"><h4>AI watchdog (Obico)</h4>'+
          '<div class="cfg-row"><label>ML API URL</label>'+ti('set-mlapi',ai.mlApi,'text','http://192.168.10.168:3333')+'</div>'+
          '<div class="cfg-hint">Your one self-hosted Obico ML API — it scores <b>both</b> printers, no second server needed. The Anvil’s snapshot is served by this console at <code>'+snapEx+'</code> and fetched automatically.</div>'+
          '<div class="cfg-row"><label>Poll seconds</label>'+ti('set-poll',ai.pollSeconds,'number')+'<label style="width:auto">Start grace (s)</label>'+ti('set-grace',ai.startGraceSec,'number')+'</div>'+
          '<div class="cfg-row"><label>Default ntfy topic</label>'+ti('set-ntfy',(ai.notify||{}).ntfyTopic,'text','https://ntfy.sh/my-alerts')+'</div>'+
          '<div class="cfg-hint">Per-printer mode, sensitivity, dead zones &amp; ntfy topic live on each card’s <b>AI</b> pill. This is just the shared model + defaults.</div>'+
        '</div>'+
        '<div class="section"><h4>3D Files library</h4>'+
          '<div class="cfg-row"><label>Folder (root)</label>'+ti('set-froot',fl.root,'text','\\\\Server\\Share\\3D Files or D:\\3D Files')+'</div>'+
          '<div class="cfg-row"><label>Label</label>'+ti('set-flabel',fl.label)+'<label style="width:auto">Browsing</label>'+yn('set-fen',fl.enabled)+'<label style="width:auto">Editing</label>'+yn('set-fwr',fl.writable)+'</div>'+
        '</div>';
    prs.forEach(function(p,i){
      h+='<div class="cfg-print"><h5>Printer '+i+' <span class="tag">'+(p.driver||'')+'</span></h5>'+
        '<div class="cfg-row"><label>Nickname</label>'+ti('p'+i+'-nick',p.nickname,'text','The Anvil')+'<label style="width:auto">Name</label>'+ti('p'+i+'-name',p.name)+'</div>'+
        '<div class="cfg-row"><label>Model</label>'+ti('p'+i+'-model',p.model)+'</div>'+
        '<div class="cfg-row"><label>IP address</label>'+ti('p'+i+'-ip',p.ip,'text','192.168.10.x')+'<label style="width:auto">Driver</label><select id="p'+i+'-driver"><option value="sdcp"'+(p.driver==='sdcp'?' selected':'')+'>Elegoo SDCP (Centauri)</option><option value="moonraker"'+(p.driver==='moonraker'?' selected':'')+'>Klipper/Moonraker (Giga)</option></select></div>'+
        '<div class="cfg-row"><label>Webcam URL</label>'+ti('p'+i+'-webcam',p.webcamUrl,'text','http://ip/webcam/?action=stream')+'</div>'+
        '<div class="cfg-hint">Moonraker only — the MJPEG stream URL. SDCP discovers its camera automatically.</div>'+
        '<div class="cfg-row"><label>Moonraker port</label>'+ti('p'+i+'-mport',p.moonrakerPort,'number')+'<label style="width:auto">Base URL</label>'+ti('p'+i+'-mbase',p.moonrakerBase,'text','auto')+'</div>'+
        '<div class="cfg-row"><label>Chamber sensor</label>'+ti('p'+i+'-cham',p.chamberSensor,'text','chamber')+'</div>'+
        '<div class="cfg-row"><label>SDCP WS port</label>'+ti('p'+i+'-wsport',p.sdcpWsPort,'number')+'<label style="width:auto">Mainboard ID</label>'+ti('p'+i+'-mbid',p.mainboardId,'text','auto-discover')+'</div>'+
        '<div class="cfg-row"><label>AI snapshot URL</label>'+ti('p'+i+'-snap',(p.spaghetti||{}).snapshotUrl,'text','leave blank = automatic')+'</div>'+
        '<div class="cfg-hint">Advanced — override only if auto-detection picks the wrong camera frame.</div>'+
      '</div>';
    });
    h+='<div class="cfg-save"><button class="btn primary" id="set-save">Save settings</button><button class="btn ghost" id="set-cancel">Cancel</button><div class="muted" style="flex:1;text-align:right">Saved to <code>config.local.json</code></div></div>'+
      '</div>';
    document.getElementById('settings').innerHTML=h;
    document.getElementById('set-close').onclick=closeSettings;
    document.getElementById('set-cancel').onclick=closeSettings;
    document.getElementById('set-save').onclick=saveSettings;
  }
  function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}
  function gnum(id){var v=gv(id);return v===''?undefined:Number(v);}
  function gyn(id){var e=document.getElementById(id);return e?e.value==='yes':undefined;}
  function collectSettings(){
    var prs=(cfgData.printers||[]).map(function(p,i){return {
      name:gv('p'+i+'-name'),nickname:gv('p'+i+'-nick'),model:gv('p'+i+'-model'),ip:gv('p'+i+'-ip'),
      driver:gv('p'+i+'-driver'),webcamUrl:gv('p'+i+'-webcam'),moonrakerPort:gnum('p'+i+'-mport'),
      moonrakerBase:gv('p'+i+'-mbase'),chamberSensor:gv('p'+i+'-cham'),sdcpWsPort:gnum('p'+i+'-wsport'),
      mainboardId:gv('p'+i+'-mbid'),spaghetti:{snapshotUrl:gv('p'+i+'-snap')}
    };});
    return {
      console:{publicUrl:gv('set-pub'),port:gnum('set-port'),host:gv('set-host')},
      ai:{mlApi:gv('set-mlapi'),pollSeconds:gnum('set-poll'),startGraceSec:gnum('set-grace'),notify:{ntfyTopic:gv('set-ntfy')}},
      files:{root:gv('set-froot'),label:gv('set-flabel'),enabled:gyn('set-fen'),writable:gyn('set-fwr')},
      printers:prs
    };
  }
  function saveSettings(){var btn=document.getElementById('set-save');if(btn){btn.disabled=true;btn.textContent='Saving…';}
    post('/api/config',collectSettings()).then(function(r){
      if(r&&r.ok){toast('Settings saved','ok');
        if(r.restartRequired){confirmBox({title:'Restart needed',okText:'Got it',msg:'Port/Host changes take effect the next time the server (node server.js) restarts. Everything else is already live.'}).then(function(){closeSettings();});}
        else{setTimeout(function(){location.reload();},650);}
      }else{toast((r&&r.error)||'Save failed','err');if(btn){btn.disabled=false;btn.textContent='Save settings';}}
    }).catch(function(){toast('Save failed','err');if(btn){btn.disabled=false;btn.textContent='Save settings';}});
  }

  /* ---- views + wiring ---- */
  function showView(v){document.querySelectorAll('.view').forEach(function(x){x.classList.remove('on');});document.getElementById('view-'+v).classList.add('on');
    document.querySelectorAll('.nav-btn[data-view]').forEach(function(b){b.classList.toggle('on',b.dataset.view===v);});
    document.getElementById('tb-dashboard').style.display=v==='dashboard'?'flex':'none';
    document.getElementById('tb-files').style.display=v==='files'?'flex':'none';
    if(v==='files'&&!filesInit){filesInit=true;getJSON('/api/files/config').then(function(cfg){filesWritable=!!cfg.writable;document.getElementById('files-newfolder').style.display=filesWritable?'inline-flex':'none';}).catch(function(){});loadFiles('');}}
  document.getElementById('nav').addEventListener('click',function(e){var b=e.target.closest('.nav-btn');if(!b)return;if(b.id==='nav-filament'){openFilament();return;}if(b.id==='nav-logs'){openLogs();return;}if(b.id==='nav-settings'){openSettings();return;}if(b.dataset.view)showView(b.dataset.view);});
  document.getElementById('cols').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;[].forEach.call(this.children,function(x){x.classList.remove('on');});b.classList.add('on');grid.className=b.dataset.cols==='auto'?'':('cols-'+b.dataset.cols);});
  document.getElementById('reconnect-all').addEventListener('click',function(){Object.keys(cards).forEach(connect);});
  document.getElementById('files-refresh').addEventListener('click',function(){loadFiles(filesCwd);});
  document.getElementById('files-search').addEventListener('input',drawTiles);
  document.getElementById('files-newfolder').addEventListener('click',function(){promptText({title:'New folder',desc:'Created in '+(filesCwd?filesCwd:'3D Files'),placeholder:'Folder name',okText:'Create'}).then(function(name){if(!name)return;post('/api/files/mkdir',{path:filesCwd,name:name}).then(function(r){if(r.ok){toast('Folder created','ok');loadFiles(filesCwd);}else toast(r.error||'Could not create folder','err');});});});
  ['modal','filament','preview','sheet','picker','prompt','confirm','ai','calib','logs','settings'].forEach(function(n){document.getElementById(n+'-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(logsTimer){clearInterval(logsTimer);logsTimer=null;}['modal','filament','preview','sheet','picker','prompt','confirm','ai','calib','logs','settings'].forEach(function(n){hide(n+'-overlay');});}});

  getJSON('/api/printers').then(function(list){document.getElementById('total-count').textContent=list.length;
    list.forEach(function(p){printers[p.id]=p;buildCard(p);});pollAll();setInterval(pollAll,1500);pollSpag();setInterval(pollSpag,2000);
  }).catch(function(){grid.innerHTML='<div class="empty err">Could not reach the console server.</div>';});
})();
</script>
